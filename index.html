<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta property="og:image" content="https://micg25.github.io/B-B_TEST/img/logo.png" />
  <meta name="twitter:image" content="https://micg25.github.io/B-B_TEST/img/logo.png" />
  <meta property="og:url" content="https://micg25.github.io/B-B_TEST/" />
  <meta property="og:type" content="website" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  
  <link rel="icon" type="image/png" href="https://micg25.github.io/B-B_TEST/img/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="https://micg25.github.io/B-B_TEST/img/favicon/favicon.svg" />
  <link rel="shortcut icon" href="https://micg25.github.io/B-B_TEST/img/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="https://micg25.github.io/B-B_TEST/img/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="https://micg25.github.io/B-B_TEST/img/favicon/site.webmanifest" />
  
  <title>Etna 1928 Country House — Benvenuti</title>
  <meta name="description" content="Etna 1928 Country House: camere confortevoli in Sicilia. Prenota ora!" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />
  <style>
    body{ 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      line-height:1.6; 
      padding:30px 20px; 
      max-width:900px; 
      margin:auto; 
      background: #fafafa;
      color: #333;
    }
    header { 
      margin-bottom:30px; 
      text-align: center; 
      color: #2e2e2e;
    }
    header h1 {
      font-weight: 700;
      font-size: 2.8rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
      font-family: 'Georgia', serif;
    }
    header p {
      font-size: 1.2rem;
      font-style: italic;
      color: #555;
    }

    .swiper {
      position: relative;
      margin-bottom: 40px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      height: 700px;
      cursor: pointer;
      background: #ddd;
      transition: box-shadow 0.3s ease;
    }
    .swiper:hover {
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
    }

    .swiper-button-prev, .swiper-button-next {
      color: #2e2e2e;
      background: rgba(255,255,255,0.7);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(255,255,255,0.6);
    }

    .rooms-title {
      font-weight: 700;
      font-size: 1.8rem;
      margin: 50px 0 20px;
      color: #2e2e2e;
      font-family: 'Georgia', serif;
      text-align: center;
      letter-spacing: 1px;
    }

    .contacts {
      margin-top: 20px;
      padding: 30px;
      border-radius: 16px;
      background: #fefefe;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
    }
    .contacts h2 {
      text-align: center;
      font-weight: 700;
      color: #2e2e2e;
      font-size: 1.8rem;
    }
    .contacts p {
      margin: 12px 0;
      text-align: center;
      font-size: 1.15rem;
    }
    .contacts a {
      color: #b35c00;
      text-decoration: none;
      font-weight: 600;
    }

    footer { 
      margin-top:50px; 
      font-size:1rem; 
      color:#666; 
      text-align:center; 
    }

    @media (max-width: 768px) { .swiper { height: 400px; } }
    @media (max-width: 480px) { .swiper { height: 300px; } }
  </style>
</head>
<body>
  <header>
    <h1>Etna 1928 Country House</h1>
    <p>Camere e spazi accoglienti ai piedi dell'Etna</p>
  </header>
<div class="rooms-title">Visita la struttura</div>
  <div class="swiper" id="hero">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="img/principali/principale.jpg" alt="Vista esterna 1" /></div>
      <div class="swiper-slide"><img src="img/principali/principale2.jpg" alt="Vista esterna 2" /></div>
      <div class="swiper-slide"><img src="img/principali/principale3.jpg" alt="Vista esterna 3" /></div>
    </div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-pagination"></div>
  </div>

  

  <section class="contacts">
    <h2>Contatti</h2>
    <!--<p>Email: <a href="mailto:info@etna1928.it">info@etna1928.it</a></p>--!>
    <p>Telefono: <a href="tel:+39333 739 7919">+39 333 739 7919</a></p>
    <p>Guarda le recensioni su <a href="https://www.booking.com/hotel/it/satellite-dell-39-etna.it.html#tab-reviews" target="_blank">Booking.com</a></p>
  </section>

  <footer>
    <p>© Etna 1928 Country House</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
  <script>
    const swiper = new Swiper("#hero", {
      loop: true,
      navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
      pagination: { el: ".swiper-pagination", clickable: true },
      autoplay: { delay: 4000, disableOnInteraction: false }
    });
  </script>
</body>
</html>
